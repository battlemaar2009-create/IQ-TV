name: Hybrid Movie Scraper

on:
  # 1. المسح التلقائي المجدول (كل 6 ساعات)
  schedule:
    - cron: '0 */6 * * *'
  
  # 2. التشغيل الفوري عند طلب مستخدم (Trigger)
  repository_dispatch:
    types: [user_request]
  
  # 3. إمكانية التشغيل اليدوي من الموقع
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install telethon supabase
      - name: Execute Scraper
        env:
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python main_scraper.py
        
