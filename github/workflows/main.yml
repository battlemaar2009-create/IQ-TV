name: Movie Database Automation

on:
  schedule:
    - cron: '0 */4 * * *' # تشغيل تلقائي كل 4 ساعات
  workflow_dispatch:      # إمكانية التشغيل اليدوي بضغطة زر

jobs:
  automation-task:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install telethon supabase python-dotenv

      - name: Run Scraper Engine
        env:
          # هذا المتغير الوحيد الذي يجب أن تضعه في GitHub Secrets
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python main_scraper.py
        
